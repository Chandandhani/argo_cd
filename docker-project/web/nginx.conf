events { }

http {
    upstream flask_app {
        server app:5000;  # Flask service name from docker-compose
    }

    server {
        listen 80;

        # Serve static HTML content
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # Proxy requests to Flask backend
        location /api/ {
            proxy_pass http://flask_app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
