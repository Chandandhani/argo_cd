apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: chandandhani7556/flask_app:v1
        ports:
        - containerPort: 5000
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres:5432/mydb"
        - name: REDIS_HOST
          value: "redis"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-app
  namespace: demo-app
spec:
  type: ClusterIP
  ports:
  - port: 5000
  selector:
    app: flask-app
